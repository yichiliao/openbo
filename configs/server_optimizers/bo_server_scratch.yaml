# Branin-first default config.
# In OpenBO we maximize a flipped Branin objective: y = -Branin(x).
# On normalized [0,1]^2 this typically stays in a negative range,
# with best known value near -0.3979.
optimizer: bo_scratch
input_dim: 2
y_range: [-350.0, 1.0]

# Optional defaults used when start message omits fields.
n_init_default: 2
n_iter_default: 8
n_candidates_default: 512
n_starts_default: 8
search_strategy_default: multistart
kernel_type_default: matern52
optimize_hyperparameters_default: true
