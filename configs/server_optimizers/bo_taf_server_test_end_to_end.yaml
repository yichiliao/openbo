# Branin-first dedicated TAF server config.
# In OpenBO we maximize a flipped Branin objective: y = -Branin(x).
input_dim: 2
y_range: [-350.0, 1.0]

# Path to source surrogates produced by TAF training
# (must contain gp_states/*.json and trajectories/*.json).
taf_run_dir: meta-bo-training/taf-gps/branin_server_end_to_end

# Optional defaults used when start message omits fields.
n_init_default: 0
n_iter_default: 30
n_candidates_default: 512
n_starts_default: 8
search_strategy_default: multistart
kernel_type_default: matern52
optimize_hyperparameters_default: true
taf_weight_mode_default: taf_m
taf_rho_default: 1.0
source_only_warmup_iters_default: 3
track_acquisition_default: true
